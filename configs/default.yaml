# Configuración por defecto del proyecto.
# Los valores sensibles o por entorno van en .env (tienen prioridad).
# Este archivo define los parámetros estables del sistema.

llm:
  model: llama3.1:8b
  temperature: 0.1          # baja: priorizamos fidelidad sobre creatividad
  base_url: http://localhost:11434

embeddings:
  model: intfloat/multilingual-e5-small

vector_store:
  provider: chroma
  persist_dir: ./chroma_db
  collection: immigration_docs

chunking:
  chunk_size: 500            # sliding-window (ADR-007 midió recursivo y lo descartó)
  chunk_overlap: 80          # solape para no cortar frases entre fragmentos

retrieval:
  top_k: 6
  min_score: 0.70           # por debajo de esto -> refusal controlado

security:
  max_file_size_mb: 25
  max_pages: 300
  max_input_chars: 2000

evaluation:
  thresholds:               # umbrales POC (ver RAG Evaluation Skill)
    faithfulness: 0.80
    answer_relevancy: 0.75
    context_precision: 0.70
    context_recall: 0.70
    refusal_quality: 0.90
    hallucination_rate_max: 0.10

observability:
  sink: jsonl               # jsonl | sqlite
  path: ./logs/interactions.jsonl
  redact_pii: true
