name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"   # auditoría semanal (lunes 06:00 UTC)

jobs:
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        # Las vulnerabilidades ya triadas y aceptadas conscientemente viven en
        # security/accepted-vulnerabilities.txt, con su justificación y fecha
        # de revisión — ver ese archivo y el ADR-003 antes de tocar esta lista.
        # Cualquier CVE NUEVO que no esté ahí seguirá fallando este job, que es
        # el comportamiento deseado (gate real, no decorativo).
        run: |
          IGNORE_FLAGS=$(grep -v '^#' security/accepted-vulnerabilities.txt | grep -v '^$' | sed 's/^/--ignore-vuln /' | tr '\n' ' ')
          pip-audit -r requirements.txt $IGNORE_FLAGS
