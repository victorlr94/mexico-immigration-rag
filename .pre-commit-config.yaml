# Hooks que corren antes de cada commit. Instalar con: pre-commit install
# Garantiza que nada sin formatear, con lint sucio o con secretos entre al repo.
repos:
  # --- Formateo ---
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3.11

  # --- Linting + ordenación de imports ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]

  # --- Type checking (estricto solo en el núcleo reutilizable) ---
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [--config-file, pyproject.toml]
        files: ^src/genai_toolkit/
        additional_dependencies:
          - pydantic>=2
          - pydantic-settings>=2
          - types-PyYAML

  # --- Higiene general ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: check-merge-conflict
      - id: detect-private-key

  # --- Secret scanning (Security Skill) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
