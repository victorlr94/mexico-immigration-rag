# Hooks que corren antes de cada commit. Instalar con: pre-commit install
# Garantiza que nada sin formatear, con lint sucio o con secretos entre al repo.
repos:
  # --- Formateo ---
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black

  # --- Linting + ordenación de imports ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]

  # --- Type checking ---
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, types-PyYAML]
        files: ^src/

  # --- Higiene general ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: check-merge-conflict

  # --- Secret scanning (Security Skill) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
